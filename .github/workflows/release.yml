name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --verbose
      - run: cargo clippy -- -D warnings

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../box2md-${{ matrix.target }}.tar.gz box2md

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path box2md.exe -DestinationPath ../../../box2md-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: box2md-${{ matrix.target }}
          path: box2md-${{ matrix.target }}.*

  release:
    needs: [build, package_extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: box2md-*

  package_extension:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Prepare bundled binaries for extension
        run: |
          set -euo pipefail
          rm -f vscode/bin/darwin/box2md vscode/bin/win32/box2md.exe
          mkdir -p _extracted
          tar xzf box2md-aarch64-apple-darwin.tar.gz -C _extracted
          cp _extracted/box2md vscode/bin/darwin/box2md
          chmod +x vscode/bin/darwin/box2md
          unzip -j box2md-x86_64-pc-windows-msvc.zip box2md.exe -d vscode/bin/win32

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: Install extension dependencies
        run: npm --prefix vscode ci

      - name: Compile extension
        run: npm --prefix vscode run compile

      - name: Package VSCode extension
        run: cd vscode && npx --yes @vscode/vsce package --allow-missing-repository

      - uses: actions/upload-artifact@v4
        with:
          name: box2md-vscode-vsix
          path: vscode/*.vsix
